<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eorzea Spot Card</title>
<style>
:root{color-scheme:dark;--bg:#111318;--panel:#1a1e26;--panel2:#222834;--line:#333b49;--text:#eef1f5;--muted:#aeb6c2;--accent:#d7c49a}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#202633 0,#111318 45%);color:var(--text);font-family:"Yu Gothic UI","Meiryo",sans-serif}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{width:min(1500px,96vw);margin:auto;padding:24px 0 48px}
header{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:18px}
h1{font-size:clamp(24px,3vw,38px);margin:0 0 4px;letter-spacing:.04em}
.subtitle{color:var(--muted);font-size:14px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#293140;color:white;border-radius:8px;padding:10px 16px}
.btn.primary{background:#efe4c9;color:#1d1a15;border-color:#efe4c9;font-weight:700}
.preview-shell{background:#0a0b0e;border:1px solid var(--line);border-radius:12px;padding:12px;box-shadow:0 18px 60px #0008}
.canvas-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#050505;border-radius:7px;touch-action:none}
canvas{width:100%;height:100%;display:block;cursor:grab}
canvas.dragging{cursor:grabbing}
.hint{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);background:#000a;padding:6px 11px;border-radius:999px;font-size:12px;color:#ddd;pointer-events:none;opacity:.8}
.editor{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);overflow:auto}
.tab-btn{flex:1;min-width:130px;border:0;background:#171b22;color:var(--muted);padding:14px}
.tab-btn.active{background:var(--panel2);color:white;box-shadow:inset 0 -2px var(--accent)}
.panel{display:none;padding:20px}
.panel.active{display:block}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px 20px}
.field{display:grid;gap:7px;align-content:start}
.field.full{grid-column:1/-1}
label{font-size:13px;color:#dce1e9;font-weight:700}
input[type=text],select,textarea,input[type=number]{width:100%;border:1px solid #3a4352;background:#11151c;color:white;border-radius:7px;padding:10px 11px;outline:none}
input:focus,select:focus,textarea:focus{border-color:#bcae89;box-shadow:0 0 0 2px #bcae8930}
textarea{min-height:140px;resize:vertical;line-height:1.7}
input[type=file]{width:100%;background:#11151c;border:1px dashed #4b5668;padding:12px;border-radius:7px}
.range-row{display:grid;grid-template-columns:1fr 74px;gap:10px;align-items:center}
input[type=range]{width:100%}
.small{font-size:12px;color:var(--muted)}
.check{display:flex;align-items:center;gap:9px;min-height:42px}
hr{border:0;border-top:1px solid var(--line);margin:20px 0}
.section-title{font-size:16px;margin:0 0 14px}
.position-grid{display:grid;grid-template-columns:repeat(3,46px);gap:5px}
.pos{height:38px;border:1px solid #414b5b;background:#121720;color:#cbd2dc;border-radius:6px}
.pos.active{background:#cdbf9b;color:#17140e;border-color:#cdbf9b;font-weight:bold}
.position-block{display:flex;gap:18px;align-items:start;flex-wrap:wrap}
.position-label{width:145px;color:#dfe4eb;font-size:13px;padding-top:7px}
.notice{background:#11151c;border-left:3px solid #bcae89;padding:12px 14px;color:#cfd5de;font-size:13px;line-height:1.7}
.footer-actions{display:flex;justify-content:center;gap:12px;padding:0 20px 22px}
.mode-switch{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.mode-btn{border:1px solid #414b5b;background:#121720;color:#cbd2dc;border-radius:8px;padding:10px 14px}
.mode-btn.active{background:#cdbf9b;color:#17140e;border-color:#cdbf9b;font-weight:700}
@media(max-width:800px){.app{width:100%;padding:14px}header{align-items:start;flex-direction:column}.grid{grid-template-columns:1fr}.field.full{grid-column:auto}.panel{padding:15px}}
</style>
</head>
<body>
<div class="app">
<header>
  <div><h1>Eorzea Spot Card</h1><div class="subtitle">FF14のデートスポット・絶景ポイント紹介カード作成</div></div>
  <div class="actions"><button class="btn primary" id="saveTop">PNGで保存</button><button class="btn" id="resetTop">設定リセット</button></div>
</header>
<section class="preview-shell">
  <div class="canvas-wrap" id="canvasWrap"><canvas id="card" width="1600" height="900"></canvas><div class="hint">SSはドラッグで位置調整／ホイールで拡大縮小</div></div>
</section>
<section class="editor">
  <nav class="tabs">
    <button class="tab-btn active" data-tab="basic">基本情報</button>
    <button class="tab-btn" data-tab="layout">配置</button>
    <button class="tab-btn" data-tab="style">表示設定</button>
    <button class="tab-btn" data-tab="image">SS調整</button>
  </nav>

  <div class="panel active" id="basic">
    <div class="grid">
      <div class="field full"><label>背景SS</label><input type="file" id="upload" accept="image/png,image/jpeg,image/webp"><div class="small" id="fileName">未選択</div></div>
      <div class="field"><label>スポット名</label><input type="text" id="spotName" placeholder="例：隠れ滝"></div>
      <div class="field"><label>エリア／座標</label><input type="text" id="location" placeholder="例：東ラノシア X31 Y24"></div>
      <div class="field"><label>おすすめの時間帯・天候</label><input type="text" id="condition" placeholder="例：日の出・快晴"></div>
      <div class="field"><label>目的ロゴ</label><select id="logoType"><option value="DATE SPOT">DATE SPOT</option><option value="SCENIC SPOT">SCENIC SPOT</option><option value="PHOTO SPOT">PHOTO SPOT</option><option value="SECRET SPOT">SECRET SPOT</option><option value="custom">自由入力</option><option value="">表示しない</option></select></div>
      <div class="field" id="customLogoWrap" style="display:none"><label>ロゴ文字</label><input type="text" id="customLogo" placeholder="例：NIGHT VIEW"></div>
      <div class="field full"><label>紹介文</label><textarea id="description" maxlength="500" placeholder="スポットの特徴や見どころを入力してください。"></textarea><div class="small"><span id="count">0</span> / 500</div></div>
    </div>
  </div>

  <div class="panel" id="layout">
    <div class="mode-switch">
      <button type="button" class="mode-btn" id="imageModeBtn">SS調整モード</button>
      <button type="button" class="mode-btn active" id="layoutModeBtn">レイアウトモード</button>
    </div>
    <div class="notice" style="margin-bottom:16px">レイアウトモード中は、プレビュー上でタイトルグループ・紹介文・目的ロゴを直接ドラッグして移動できます。SSを動かしたいときはSS調整モードへ切り替えてください。</div>
    <div class="field" style="max-width:460px"><label>レイアウトプリセット</label><select id="preset"><option value="a">左上タイトル・右下紹介</option><option value="b">右上タイトル・左下紹介</option><option value="c">上中央タイトル・下中央紹介</option><option value="d">左下タイトル・右上紹介</option><option value="custom">カスタム</option></select></div>
    <hr>
    <h3 class="section-title">要素の位置</h3>
    <div id="positionControls"></div>
    <hr>
    <div class="grid">
      <div class="field"><label>タイトルグループ 横微調整</label><div class="range-row"><input type="range" id="titleX" min="-300" max="300" value="0"><output>0</output></div></div>
      <div class="field"><label>タイトルグループ 縦微調整</label><div class="range-row"><input type="range" id="titleY" min="-300" max="300" value="0"><output>0</output></div></div>
      <div class="field"><label>紹介文 横微調整</label><div class="range-row"><input type="range" id="descX" min="-300" max="300" value="0"><output>0</output></div></div>
      <div class="field"><label>紹介文 縦微調整</label><div class="range-row"><input type="range" id="descY" min="-300" max="300" value="0"><output>0</output></div></div>
      <div class="field"><label>目的ロゴ 横微調整</label><div class="range-row"><input type="range" id="logoX" min="-300" max="300" value="0"><output>0</output></div></div>
      <div class="field"><label>目的ロゴ 縦微調整</label><div class="range-row"><input type="range" id="logoY" min="-300" max="300" value="0"><output>0</output></div></div>
      <div class="field"><label>権利表記 横微調整</label><div class="range-row"><input type="range" id="creditX" min="-400" max="400" value="0"><output>0</output></div></div>
      <div class="field"><label>権利表記 縦微調整</label><div class="range-row"><input type="range" id="creditY" min="-400" max="400" value="0"><output>0</output></div></div>
    </div>
  </div>

  <div class="panel" id="style">
    <div class="grid">
      <div class="field"><label>タイトル文字サイズ</label><div class="range-row"><input type="range" id="titleSize" min="44" max="130" value="88"><output>88</output></div></div>
      <div class="field"><label>サブ情報文字サイズ</label><div class="range-row"><input type="range" id="subSize" min="22" max="54" value="32"><output>32</output></div></div>
      <div class="field"><label>紹介文文字サイズ</label><div class="range-row"><input type="range" id="descSize" min="22" max="48" value="30"><output>30</output></div></div>
      <div class="field"><label>目的ロゴ文字サイズ</label><div class="range-row"><input type="range" id="logoSize" min="18" max="44" value="26"><output>26</output></div></div>
      <div class="field"><label>タイトル素材サイズ</label><div class="range-row"><input type="range" id="plateWidth" min="420" max="1100" value="820"><output>820</output></div></div>
      <div class="field"><label>タイトル素材の透明度</label><div class="range-row"><input type="range" id="plateOpacity" min="10" max="100" value="100"><output>100</output></div></div>
      <div class="field"><label>紹介文ボックス幅</label><div class="range-row"><input type="range" id="descWidth" min="450" max="1250" value="760"><output>760</output></div></div>
      <div class="field"><label>紹介文ボックス透明度</label><div class="range-row"><input type="range" id="boxOpacity" min="0" max="80" value="42"><output>42</output></div></div>
      <div class="field"><label>タイトル揃え</label><select id="titleAlign"><option value="left">左揃え</option><option value="center">中央揃え</option><option value="right">右揃え</option></select></div>
      <div class="field"><label>紹介文揃え</label><select id="descAlign"><option value="left">左揃え</option><option value="center" selected>中央揃え</option><option value="right">右揃え</option></select></div>
      <div class="field"><label class="check"><input type="checkbox" id="showPlate" checked> タイトル素材を表示</label></div>
      <div class="field"><label class="check"><input type="checkbox" id="flipPlate"> タイトル素材を左右反転</label></div>
      <div class="field"><label class="check"><input type="checkbox" id="showBox" checked> 紹介文背景を表示</label></div>
      <div class="field"><label class="check"><input type="checkbox" id="showCredit" checked> 権利表記を表示</label></div>
    </div>
  </div>

  <div class="panel" id="image">
    <div class="grid">
      <div class="field full"><label>SS拡大率</label><div class="range-row"><input type="range" id="imageScale" min="100" max="300" value="100"><output>100</output></div></div>
      <div class="field"><label>SS横位置</label><div class="range-row"><input type="range" id="imageX" min="-1000" max="1000" value="0"><output>0</output></div></div>
      <div class="field"><label>SS縦位置</label><div class="range-row"><input type="range" id="imageY" min="-1000" max="1000" value="0"><output>0</output></div></div>
      <div class="field full"><button class="btn" id="resetImage">SS位置を中央に戻す</button></div>
      <div class="field full"><div class="notice">画像はブラウザ内だけで処理され、外部へ送信されません。カードは1600×900pxのPNGとして保存されます。</div></div>
    </div>
  </div>

  <div class="footer-actions"><button class="btn primary" id="saveBottom">PNGで保存</button><button class="btn" id="resetBottom">設定リセット</button></div>
</section>
</div>

function makePositions(){
 const host=$('#positionControls'); host.innerHTML='';
 [['titlePos','タイトル＆サブ情報'],['descPos','紹介文'],['logoPos','目的ロゴ'],['creditPos','権利表記']].forEach(([key,label])=>{
  const row=document.createElement('div'); row.className='position-block'; row.style.marginBottom='16px';
  row.innerHTML=`<div class="position-label">${label}</div><div class="position-grid"></div><div class="small current-pos"></div>`;
  const grid=row.querySelector('.position-grid');
  positionKeys.forEach(p=>{const b=document.createElement('button'); b.className='pos'; b.type='button'; b.dataset.key=key; b.dataset.pos=p; b.title=positionNames[p]; b.textContent={tl:'↖',tc:'↑',tr:'↗',ml:'←',mc:'●',mr:'→',bl:'↙',bc:'↓',br:'↘'}[p]; grid.appendChild(b)});
  host.appendChild(row);
 });
 updatePositionButtons();
}
function updatePositionButtons(){
 $$('.pos').forEach(b=>b.classList.toggle('active',state[b.dataset.key]===b.dataset.pos));
 $$('#positionControls .position-block').forEach((r,i)=>{const key=['titlePos','descPos','logoPos','creditPos'][i]; r.querySelector('.current-pos').textContent=positionNames[state[key]]});
}
function anchor(pos,w,h,margin=55){
 const col=pos[1], row=pos[0]; let x=margin,y=margin;
 if(col==='c') x=(1600-w)/2; else if(col==='r') x=1600-w-margin;
 if(row==='m') y=(900-h)/2; else if(row==='b') y=900-h-margin;
 return {x,y};
}
function toCanvasPoint(e){const rect=canvas.getBoundingClientRect(); return {x:(e.clientX-rect.left)*(1600/rect.width), y:(e.clientY-rect.top)*(900/rect.height)};}
function syncRangeValue(id,value){const el=$('#'+id); if(!el) return; const v=Math.round(value); el.value=v; if(el.nextElementSibling) el.nextElementSibling.value=v;}
function updateHint(){ $('.hint').textContent = ui.mode==='layout' ? 'レイアウトモード：タイトル・紹介文・ロゴをドラッグして移動' : 'SS調整モード：SSはドラッグで位置調整／ホイールで拡大縮小'; }

function drawCover(img,scalePct,xOff,yOff){ const base=Math.max(1600/img.width,900/img.height), s=base*(scalePct/100), w=img.width*s,h=img.height*s; ctx.drawImage(img,(1600-w)/2+xOff,(900-h)/2+yOff,w,h); }
function outlinedText(text,x,y,font,align='left',lineWidth=7){ ctx.save(); ctx.font=font; ctx.textAlign=align; ctx.textBaseline='alphabetic'; ctx.lineJoin='round'; ctx.strokeStyle='rgba(0,0,0,.9)'; ctx.lineWidth=lineWidth; ctx.strokeText(text,x,y); ctx.fillStyle='white'; ctx.fillText(text,x,y); ctx.restore(); }
function wrapLines(text,maxWidth,font){ ctx.save(); ctx.font=font; const out=[]; for(const raw of text.split(/\n/)){ if(!raw){out.push(''); continue} let line=''; for(const ch of raw){const test=line+ch; if(ctx.measureText(test).width>maxWidth&&line){out.push(line); line=ch}else line=test} out.push(line)} ctx.restore(); return out; }
function getTitleMetrics(){
 const pw=state.plateWidth, ph=pw*(sourceRect.h/sourceRect.w), a=anchor(state.titlePos,pw,ph,25), x=a.x+state.titleX, y=a.y+state.titleY;
 const scale=pw/sourceRect.w, lineY=y+(856-sourceRect.y)*scale, inset=82*scale; let tx=x+inset, align=state.titleAlign;
 if(state.flipPlate){ tx=x+pw-inset; if(align==='left') align='right'; else if(align==='right') align='left'; }
 return {x,y,w:pw,h:ph,tx,align,titleFont:`700 ${state.titleSize}px "Yu Gothic UI","Meiryo",sans-serif`,subFont:`600 ${state.subSize}px "Yu Gothic UI","Meiryo",sans-serif`,subText:[state.location,state.condition].filter(Boolean).join('　　'),titleY:lineY-18*scale,subY:lineY+state.subSize*1.35};
}
function getDescriptionMetrics(){ const w=state.descWidth,pad=34,font=`500 ${state.descSize}px "Yu Gothic UI","Meiryo",sans-serif`,lines=wrapLines(state.description||'',w-pad*2,font),lh=state.descSize*1.55,h=Math.max(100,Math.max(1,lines.length)*lh+pad*2),a=anchor(state.descPos,w,h,55),x=a.x+state.descX,y=a.y+state.descY; return {x,y,w,h,pad,font,lines,lh}; }
function getLogoMetrics(){ const text=state.logoType==='custom'?state.customLogo:state.logoType; if(!text) return null; ctx.save(); ctx.font=`700 ${state.logoSize}px Georgia,serif`; const tw=ctx.measureText(text).width; ctx.restore(); const w=tw+58,h=state.logoSize+28,a=anchor(state.logoPos,w,h,55),x=a.x+state.logoX,y=a.y+state.logoY; return {text,x,y,w,h}; }
function getCreditMetrics(){ const lines=['Created by 鱗の旅人','FINAL FANTASY XIV © SQUARE ENIX']; ctx.save(); ctx.font='17px sans-serif'; const w=Math.max(...lines.map(line=>ctx.measureText(line).width)); ctx.restore(); const h=42, a=anchor(state.creditPos,w,h,40), x=a.x+state.creditX, y=a.y+state.creditY; return {lines,x,y,w,h}; }

 if(ui.mode==='layout'){ for(const it of getDragItems()){ if(ui.hoverType===it.type||ui.dragType===it.type) drawSelectionRect(it, ui.dragType===it.type); } }
}

function drawTitle(){ const m=getTitleMetrics(); if(state.showPlate&&plate.complete){ ctx.save(); ctx.globalAlpha=state.plateOpacity/100; if(state.flipPlate){ ctx.translate(m.x+m.w,m.y); ctx.scale(-1,1); ctx.drawImage(plate,sourceRect.x,sourceRect.y,sourceRect.w,sourceRect.h,0,0,m.w,m.h); } else { ctx.drawImage(plate,sourceRect.x,sourceRect.y,sourceRect.w,sourceRect.h,m.x,m.y,m.w,m.h); } ctx.restore(); } outlinedText(state.spotName||'',m.tx,m.titleY,m.titleFont,m.align,9); outlinedText(m.subText,m.tx,m.subY,m.subFont,m.align,6); }
function drawDescription(){ if(!state.description) return; const d=getDescriptionMetrics(); if(state.showBox){ctx.save(); ctx.fillStyle=`rgba(15,15,15,${state.boxOpacity/100})`; ctx.fillRect(d.x,d.y,d.w,d.h); ctx.restore()} ctx.save(); ctx.font=d.font; ctx.textAlign=state.descAlign; ctx.textBaseline='top'; ctx.fillStyle='white'; ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=6; ctx.shadowOffsetY=2; let tx=d.x+d.pad; if(state.descAlign==='center') tx=d.x+d.w/2; if(state.descAlign==='right') tx=d.x+d.w-d.pad; d.lines.forEach((ln,i)=>ctx.fillText(ln,tx,d.y+d.pad+i*d.lh)); ctx.restore(); }
function drawLogo(){ const l=getLogoMetrics(); if(!l) return; ctx.save(); ctx.font=`700 ${state.logoSize}px Georgia,serif`; ctx.fillStyle='rgba(0,0,0,.50)'; ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=2; ctx.fillRect(l.x,l.y,l.w,l.h); ctx.strokeRect(l.x,l.y,l.w,l.h); ctx.fillStyle='white'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(l.text,l.x+l.w/2,l.y+l.h/2+1); ctx.restore(); }
function drawCredit(){ if(!state.showCredit) return; const c=getCreditMetrics(); ctx.save(); ctx.font='17px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle='rgba(255,255,255,.88)'; ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=4; ctx.fillText(c.lines[0], c.x, c.y); ctx.fillText(c.lines[1], c.x, c.y+21); ctx.restore(); }
function bindText(id,key){ const el=$(id); el.value=state[key]; el.addEventListener('input',()=>{ state[key]=el.value; if(key==='description') $('#count').textContent=el.value.length; saveState(); render(); }); }
function bindRange(id,key){ const el=$(id), out=el.nextElementSibling; el.value=state[key]; out.value=state[key]; el.addEventListener('input',()=>{ state[key]=+el.value; out.value=el.value; saveState(); render(); }); }
function saveState(){ try{localStorage.setItem('eorzeaSpotCard',JSON.stringify(state))}catch(e){} }
function loadState(){ try{ const s=JSON.parse(localStorage.getItem('eorzeaSpotCard')); if(s){ state={...defaults,...s}; if(!Number.isFinite(state.plateWidth)||state.plateWidth>1100||state.plateWidth<420) state.plateWidth=820; } }catch(e){} }
function syncUI(){ ['#spotName','#location','#condition','#description','#customLogo'].forEach((id,i)=>{const keys=['spotName','location','condition','description','customLogo']; $(id).value=state[keys[i]]}); $('#count').textContent=state.description.length; $('#logoType').value=state.logoType; $('#customLogoWrap').style.display=state.logoType==='custom'?'grid':'none'; ['titleX','titleY','descX','descY','logoX','logoY','creditX','creditY','titleSize','subSize','descSize','logoSize','plateWidth','plateOpacity','descWidth','boxOpacity','imageScale','imageX','imageY'].forEach(k=>{const el=$('#'+k); el.value=state[k]; el.nextElementSibling.value=state[k]}); ['titleAlign','descAlign'].forEach(k=>$('#'+k).value=state[k]); ['showPlate','flipPlate','showBox','showCredit'].forEach(k=>$('#'+k).checked=state[k]); updatePositionButtons(); }

loadState(); makePositions(); syncUI(); updateHint();
bindText('#spotName','spotName'); bindText('#location','location'); bindText('#condition','condition'); bindText('#description','description'); bindText('#customLogo','customLogo');
['titleX','titleY','descX','descY','logoX','logoY','creditX','creditY','titleSize','subSize','descSize','logoSize','plateWidth','plateOpacity','descWidth','boxOpacity','imageScale','imageX','imageY'].forEach(k=>bindRange('#'+k,k));
['titleAlign','descAlign'].forEach(k=>$('#'+k).addEventListener('change',e=>{state[k]=e.target.value; saveState(); render()}));
['showPlate','flipPlate','showBox','showCredit'].forEach(k=>$('#'+k).addEventListener('change',e=>{state[k]=e.target.checked; saveState(); render()}));
$('#logoType').addEventListener('change',e=>{state.logoType=e.target.value; $('#customLogoWrap').style.display=e.target.value==='custom'?'grid':'none'; saveState(); render()});
$('#positionControls').addEventListener('click',e=>{const b=e.target.closest('.pos'); if(!b) return; state[b.dataset.key]=b.dataset.pos; $('#preset').value='custom'; updatePositionButtons(); saveState(); render()});
$('#preset').addEventListener('change',e=>{const p=e.target.value; if(p==='a') Object.assign(state,{titlePos:'tl',descPos:'br',logoPos:'tr'}); if(p==='b') Object.assign(state,{titlePos:'tr',descPos:'bl',logoPos:'tl'}); if(p==='c') Object.assign(state,{titlePos:'tc',descPos:'bc',logoPos:'tr'}); if(p==='d') Object.assign(state,{titlePos:'bl',descPos:'tr',logoPos:'tl'}); updatePositionButtons(); saveState(); render()});
$$('.tab-btn').forEach(b=>b.addEventListener('click',()=>{$$('.tab-btn').forEach(x=>x.classList.remove('active')); $$('.panel').forEach(x=>x.classList.remove('active')); b.classList.add('active'); $('#'+b.dataset.tab).classList.add('active')}));
$('#imageModeBtn').addEventListener('click',()=>setMode('image'));
$('#layoutModeBtn').addEventListener('click',()=>setMode('layout'));
$('#upload').addEventListener('change',e=>{const f=e.target.files[0]; if(!f) return; $('#fileName').textContent=f.name; const url=URL.createObjectURL(f); bg.onload=()=>{hasBg=true; state.imageScale=100; state.imageX=0; state.imageY=0; syncUI(); render(); URL.revokeObjectURL(url)}; bg.src=url});

canvas.addEventListener('pointerdown',e=>{ const p=toCanvasPoint(e); if(ui.mode==='layout'){ const hit=hitTest(p.x,p.y); if(!hit) return; ui.dragType=hit; } else { if(!hasBg) return; ui.dragType='image'; } ui.dragging=true; canvas.classList.add('dragging'); canvas.setPointerCapture(e.pointerId); ui.lastX=p.x; ui.lastY=p.y; render(); });
canvas.addEventListener('pointermove',e=>{ const p=toCanvasPoint(e); if(!ui.dragging){ if(ui.mode==='layout'){ ui.hoverType=hitTest(p.x,p.y); canvas.style.cursor=ui.hoverType ? 'grab' : 'default'; render(); } else { canvas.style.cursor=hasBg ? 'grab' : 'default'; } return; } const dx=p.x-ui.lastX, dy=p.y-ui.lastY; ui.lastX=p.x; ui.lastY=p.y; if(ui.dragType==='image'){ state.imageX+=dx; state.imageY+=dy; syncRangeValue('imageX',state.imageX); syncRangeValue('imageY',state.imageY); } else if(ui.dragType==='title'){ state.titleX+=dx; state.titleY+=dy; syncRangeValue('titleX',state.titleX); syncRangeValue('titleY',state.titleY); $('#preset').value='custom'; } else if(ui.dragType==='desc'){ state.descX+=dx; state.descY+=dy; syncRangeValue('descX',state.descX); syncRangeValue('descY',state.descY); $('#preset').value='custom'; } else if(ui.dragType==='logo'){ state.logoX+=dx; state.logoY+=dy; syncRangeValue('logoX',state.logoX); syncRangeValue('logoY',state.logoY); $('#preset').value='custom'; } else if(ui.dragType==='credit'){ state.creditX+=dx; state.creditY+=dy; syncRangeValue('creditX',state.creditX); syncRangeValue('creditY',state.creditY); $('#preset').value='custom'; } render(); });
function endDrag(){ if(!ui.dragging) return; ui.dragging=false; ui.dragType=null; canvas.classList.remove('dragging'); saveState(); render(); }
canvas.addEventListener('pointerup',endDrag); canvas.addEventListener('pointercancel',endDrag); canvas.addEventListener('pointerleave',()=>{ if(!ui.dragging&&ui.mode==='layout'&&ui.hoverType){ ui.hoverType=null; render(); } });
canvas.addEventListener('wheel',e=>{ if(ui.mode!=='image'||!hasBg) return; e.preventDefault(); state.imageScale=Math.max(100,Math.min(300,state.imageScale+(e.deltaY<0?5:-5))); syncRangeValue('imageScale',state.imageScale); saveState(); render(); },{passive:false});
function savePNG(){ if(!hasBg&&!confirm('背景SSが未設定です。このまま保存しますか？')) return; const a=document.createElement('a'); a.download=(state.spotName||'eorzea-spot-card')+'.png'; a.href=canvas.toDataURL('image/png'); a.click(); }
function resetAll(){ if(!confirm('入力内容と設定を初期状態に戻しますか？')) return; state={...defaults}; localStorage.removeItem('eorzeaSpotCard'); hasBg=false; $('#upload').value=''; $('#fileName').textContent='未選択'; syncUI(); render(); }
$('#saveTop').onclick=$('#saveBottom').onclick=savePNG; $('#resetTop').onclick=$('#resetBottom').onclick=resetAll;
$('#resetImage').addEventListener('click',()=>{ state.imageScale=100; state.imageX=0; state.imageY=0; syncUI(); saveState(); render(); });
plate.onload=render; setMode('layout'); render();
</script>
</body>
</html>
